services:
  symphony:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - upload-data:/root/bluebook/upload
      # Hot-reload-ish frontend/template resources for quick UI testing.
      # If FreeMarker/template cache is enabled, run: docker restart symphony
      - ./src/main/resources/skins:/opt/bluebook/skins
      - ./src/main/resources/js:/opt/bluebook/js
      - ./src/main/resources/css:/opt/bluebook/css
      - ./src/main/resources/scss:/opt/bluebook/scss
