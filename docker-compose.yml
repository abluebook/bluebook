services:
  symphony:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symphony
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8080"
    environment:
      TZ: ${TZ}
      RUNTIME_DB: ${RUNTIME_DB}
      JDBC_DRIVER: ${JDBC_DRIVER}
      JDBC_URL: ${JDBC_URL}
      JDBC_USERNAME: ${MYSQL_USER}
      JDBC_PASSWORD: ${MYSQL_PASSWORD}
      RSA_PRIVATE_KEY_PATH: ${RSA_PRIVATE_KEY_PATH}
      RSA_PUBLIC_KEY_PATH: ${RSA_PUBLIC_KEY_PATH}
    volumes:
      - upload-data:/root/sym/upload
      # Generate and mount fixed RSA keys for production deployments:
      # - ./secrets/rsa_private.pem:/run/secrets/rsa_private.pem:ro
      # - ./secrets/rsa_public.pem:/run/secrets/rsa_public.pem:ro
    command:
      - --runtime_mode
      - PRODUCTION
      - --listen_port
      - "8080"
      - --server_scheme
      - ${SERVER_SCHEME}
      - --server_host
      - ${SERVER_HOST}
      - --server_port
      - "${SERVER_PORT}"

  mysql:
    image: mysql:8.4
    container_name: symphony-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  upload-data:
